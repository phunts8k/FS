<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CouponHub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Coupon<span>Hub</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="./coupons.html">Coupons</a></li>
      <li><a href="./login.html" class="active" id="authLink">Login</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">

  <div class="auth-left">
    <div class="auth-left-inner">
      <div style="font-size:2.5rem; margin-bottom:1rem;">🎟️</div>
      <h2>Save more,<br>spend less.</h2>
      <p>Join CouponHub and unlock access to hundreds of verified discount codes.</p>
      <ul>
        <li>✅ 500+ active coupons</li>
        <li>✅ Save your favourites</li>
        <li>✅ One-click copy</li>
        <li>✅ Updated daily</li>
      </ul>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">

      <div>
        <h2 style="font-size:1.5rem; font-weight:800;">Welcome back</h2>
        <p class="text-muted" style="font-size:0.875rem;">Login or create a new account</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="show('login')">Login</button>
        <button class="auth-tab" id="tabReg" onclick="show('reg')">Register</button>
      </div>

      <div id="errBox" class="alert alert-red" style="display:none"></div>

      <!-- Login -->
      <div id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="lEmail" /></div>
        <div class="field"><label>Password</label><input type="password" id="lPass" /></div>
        <button class="btn btn-primary btn-full" id="loginBtn">Login</button>
      </div>

      <!-- Register -->
      <div id="regForm" style="display:none">
        <div class="field"><label>Name</label><input type="text" id="rName" /></div>
        <div class="field"><label>Email</label><input type="email" id="rEmail" /></div>
        <div class="field"><label>Password</label><input type="password" id="rPass" /></div>
        <button class="btn btn-primary btn-full" id="regBtn">Register</button>
      </div>

    </div>
  </div>
</div>

<script src="../js/utils.js"></script>

<script>
  if (isLoggedIn()) location.href = getUser()?.role === 'admin'
    ? './admin.html'
    : './dashboard.html';

  function show(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    try {
      const data = await request('/auth/login', 'POST', {
        email: lEmail.value,
        password: lPass.value
      });
      saveAuth(data.token, data.user);
      location.href = data.user.role === 'admin'
        ? './admin.html'
        : './dashboard.html';
    } catch (e) {
      alert(e.message);
    }
  });

  document.getElementById('regBtn').addEventListener('click', async () => {
    try {
      const data = await request('/auth/register', 'POST', {
        name: rName.value,
        email: rEmail.value,
        password: rPass.value
      });
      saveAuth(data.token, data.user);
      location.href = './dashboard.html';
    } catch (e) {
      alert(e.message);
    }
  });
</script>

</body>
</html>
